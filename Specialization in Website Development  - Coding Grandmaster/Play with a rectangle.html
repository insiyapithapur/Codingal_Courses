<!DOCTYPE html>
<html>
  <head>
    <title>Make changes to the rectangle</title>
    <style>
      h2 {
        text-align: center;
      }
      .rectangle {
        border: 1px solid black;
        width: 200px;
        height: 200px;
        margin: auto;
      }
      .buttons {
        padding: 20px;
        width: 200px;
        margin: auto;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h2>Make changes to the rectangle</h2>

    <div class="rectangle"></div>

    <div class="buttons">
      <button onclick="changeToCircle()">Make circle</button>
      <button onclick="hideRect()">Hide</button>
      <button onclick="showRect()">Show</button>
    </div>

    <script>
      let div = document.querySelector(".rectangle");

      function changeToCircle() {
        div.style.borderRadius = "50%";
      }

      function hideRect() {
        div.style.display = "none";
      }

      function showRect() {
        div.style.display = "block";
      }

      div.onmouseenter = function () {
        div.style.background = "red";
      };

      div.onmouseleave = function () {
        div.style.background = "transparent";
      };
    </script>
  </body>
</html>
